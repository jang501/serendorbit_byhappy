<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERENDI ORBIT - 행복을 보관하는 우주 정거장</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-purple: #6C5CE7;
            --secondary-orbit: #A29BFE;
            --point-orange: #FF7675;
            --bg-navy: #0F0C20;
            --card-dark: #1F1B3A;
            --text-beige: #FDCB6E;
            --text-light: #F5F6FA;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', sans-serif; }
        body { background-color: var(--bg-navy); color: var(--text-light); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; background: linear-gradient(to bottom, #161233, #0F0C20); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8); padding-bottom: 70px; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 1.3rem; color: var(--text-light); letter-spacing: 2px; }
        
        .user-profile-bar { background: rgba(0,0,0,0.3); padding: 12px 15px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .login-form-container { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        .login-row { display: flex; gap: 6px; }
        .login-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; color: white; border-radius: 6px; font-size: 0.8rem; margin-bottom: 0; }
        .profile-status { display: flex; justify-content: space-between; align-items: center; }
        
        /* 닉네임 설정 영역 스타일 */
        .nickname-box { display: flex; gap: 6px; margin-top: 8px; background: rgba(255, 118, 117, 0.1); padding: 8px; border-radius: 8px; align-items: center; }
        .nickname-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 5px 8px; color: white; border-radius: 6px; font-size: 0.8rem; }

        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; border-radius: 5px; cursor: pointer; border: none; background: #444; color: white; font-weight: bold; }
        .content-section { padding: 20px; display: none; overflow-y: auto; flex: 1; }
        .content-section.active { display: block; }
        .obi-box { background: rgba(108, 92, 231, 0.2); border: 1px solid var(--primary-purple); border-radius: 15px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .obi-avatar { font-size: 1.8rem; }
        .obi-text { font-size: 0.85rem; color: var(--text-beige); }
        .record-card { background: var(--card-dark); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .record-card h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--text-beige); }
        textarea, input[type="text"], input[type="date"], input[type="password"] { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 10px; resize: none; margin-bottom: 10px; font-size: 0.9rem; }
        .meta-selects { display: flex; gap: 10px; margin-bottom: 10px; }
        select { flex: 1; background: #2D2654; border: none; color: white; padding: 8px; border-radius: 8px; font-size: 0.85rem; }
        button { width: 100%; background: var(--primary-purple); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* 피드 아이템 및 댓글 스타일 */
        .feed-item { background: var(--card-dark); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--point-orange); position: relative; }
        .feed-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 8px; align-items: center; }
        .feed-user { color: var(--text-beige); font-weight: bold; }
        .feed-body { font-size: 0.9rem; line-height: 1.4; margin-bottom: 10px; }
        .feed-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--secondary-orbit); margin-bottom: 10px; }
        .btn-del { background: none; color: #ff7675; width: auto; padding: 0; font-size: 0.75rem; cursor: pointer; font-weight: normal; }
        
        /* 댓글 레이아웃 */
        .comment-section { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; margin-top: 5px; }
        .comment-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; max-height: 120px; overflow-y: auto; }
        .comment-item { background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; line-height: 1.3; }
        .comment-author { color: var(--secondary-orbit); font-weight: bold; margin-right: 5px; }
        .comment-form { display: flex; gap: 6px; }
        .comment-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 6px 10px; color: white; border-radius: 6px; font-size: 0.8rem; margin-bottom: 0; }
        .btn-comment-submit { width: auto; padding: 0 12px; font-size: 0.8rem; border-radius: 6px; background: var(--primary-purple); }

        nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background: #120E29; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; font-size: 0.75rem; }
        .nav-item.active { color: var(--text-beige); }
        
        .capsule-card { background: var(--card-dark); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary-purple); }
        .room-tag { background: var(--primary-purple); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; }
    </style>
</head>
<body>

<div class="app-container" id="captureArea">
    <header>
        <h1>SERENDI ORBIT</h1>
    </header>

    <div class="user-profile-bar" data-html2canvas-ignore="true">
        <div class="profile-status">
            <div>👤 <span id="userName" style="color:var(--text-beige); font-weight:bold;">비로그인 상태</span></div>
            <div>🪐 <span id="currentRoom">공용 로비</span></div>
        </div>
        
        <div class="nickname-box">
            <span style="font-size:0.75rem; color:var(--text-beige); font-weight:bold; white-space:nowrap;">우주 닉네임 :</span>
            <input type="text" id="userNicknameInput" class="nickname-input" placeholder="호출 명칭 설정 (미설정 시 이메일/익명)" oninput="saveNickname()">
        </div>
        
        <div class="login-form-container" id="loginFormArea">
            <div class="login-row">
                <input type="text" id="emailInput" class="login-input" placeholder="이메일 주소">
                <input type="password" id="passwordInput" class="login-input" placeholder="비밀번호">
            </div>
            <div class="login-row">
                <button class="btn-sm" onclick="userAuth('signIn')" style="background:var(--primary-purple); flex:1;">로그인 인증</button>
                <button class="btn-sm" onclick="userAuth('signUp')" style="background:#2d2654; flex:1;">신규 인증 등록</button>
            </div>
            <div style="text-align: right; margin-top: 2px;">
                <span onclick="resetPasswordByEmail()" style="font-size:0.75rem; color:var(--secondary-orbit); cursor:pointer; text-decoration:underline;">비밀번호 변경하기</span>
            </div>
        </div>
        <div id="logoutFormArea" style="display:none; text-align:right; margin-top:5px;">
            <button class="btn-sm" onclick="userLogout()" style="background:#444; width:auto;">로그아웃</button>
        </div>

        <div class="btn-group">
            <button class="btn-sm" onclick="createRoom()" style="background:#2d2654; flex:1;">방 만들기</button>
            <button class="btn-sm" onclick="joinRoom()" style="background:var(--point-orange); flex:1;">방 입장</button>
        </div>
    </div>

    <div style="padding: 0 20px; margin-top: 10px;">
        <div class="obi-box">
            <div class="obi-avatar">🪐</div>
            <div class="obi-text" id="obiMessage">"오늘 어떤 행복한 궤도를 발견했어? (24시간 동안 보관돼!)"</div>
        </div>
    </div>

    <section id="home-sec" class="content-section active">
        <div class="record-card" data-html2canvas-ignore="true">
            <h3>오늘 나의 소확행 기록하기</h3>
            <textarea id="feedContent" placeholder="여기에 오늘의 소소한 행복을 기록해보세요..."></textarea>
            <div class="meta-selects">
                <select id="feedEmotion">
                    <option value="😊 행복">😊 행복</option>
                    <option value="😌 편안">😌 편안</option>
                    <option value="🥰 설렘">🥰 설렘</option>
                    <option value="🤪 재미">🤪 재미</option>
                </select>
                <select id="feedCategory">
                    <option value="☕ 카페/맛집">☕ 카페/맛집</option>
                    <option value="🌇 산책/풍경">🌇 산책/풍경</option>
                    <option value="📚 휴식/문화">📚 휴식/문화</option>
                    <option value="✨ 기타">✨ 기타</option>
                </select>
            </div>
            <button onclick="saveFeed()">궤도에 쏘아올리기 🚀</button>
            <button onclick="downloadFeedAsImage()" style="background:#2d2654; margin-top:8px; font-size:0.8rem; padding:8px;">📥 현재 피드 이미지로 다운로드</button>
        </div>
        <div id="feedSpace"></div>
    </section>

    <section id="capsule-sec" class="content-section">
        <div class="record-card" style="border-left: 4px solid var(--primary-purple);" data-html2canvas-ignore="true">
            <h3>🫙 타임캡슐 만들기</h3>
            <input type="text" id="capTitle" placeholder="캡슐 제목">
            <input type="date" id="capDate">
            <textarea id="capItems" placeholder="기억하고 싶은 순간들을 적어주세요."></textarea>
            <button onclick="saveCapsule()" style="background:var(--point-orange)">우주 캡슐 봉인하기 🔒</button>
        </div>
        <div class="capsule-list" id="capsuleSpace"></div>
    </section>

    <section id="my-sec" class="content-section">
        <div class="record-card">
            <h3 style="color:var(--point-orange)">🚀 내가 우주에 쓴 기록 모아보기</h3>
            <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;" data-html2canvas-ignore="true">내가 쓴 모든 역대 기록이 보관됩니다.</p>
            <div id="myFeedSpace"></div>
        </div>
    </section>

    <nav data-html2canvas-ignore="true">
        <div class="nav-item active" onclick="switchTab('home-sec', this)">🏠<span>HOME</span></div>
        <div class="nav-item" onclick="switchTab('capsule-sec', this)">🫙<span>CAPSULE</span></div>
        <div class="nav-item" onclick="switchTab('my-sec', this)">🚀<span>MY</span></div>
    </nav>
</div>

<script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyoDvWNrX8-Zx8OVjFEPqCOj-lK5Ql55TgHMa7sjTh-FOP3pt3SWF4OZ7M21Jqz3KTs/exec"; 

    let currentUser = localStorage.getItem('orbit_user_email') || null;
    let currentRoomId = localStorage.getItem('roomId') || 'default';
    let userNickname = localStorage.getItem('orbit_user_nickname') || '';
    let loadedFeedsData = [];

    window.onload = () => {
        if(userNickname) document.getElementById('userNicknameInput').value = userNickname;
        updateUI();
        loadFeeds();
    };

    function saveNickname() {
        const nick = document.getElementById('userNicknameInput').value.trim();
        userNickname = nick;
        localStorage.setItem('orbit_user_nickname', nick);
        updateUI();
    }

    function getSenderName() {
        if(userNickname) return userNickname;
        if(currentUser) return currentUser.split('@')[0];
        return '익명 행성';
    }

    function updateUI() {
        if (currentUser) {
            document.getElementById('userName').innerText = userNickname ? `${userNickname} (${currentUser})` : currentUser;
            document.getElementById('loginFormArea').style.display = 'none';
            document.getElementById('logoutFormArea').style.display = 'block';
        } else {
            document.getElementById('userName').innerText = userNickname ? `${userNickname} (익명)` : "비로그인 상태 (익명)";
            document.getElementById('loginFormArea').style.display = 'flex';
            document.getElementById('logoutFormArea').style.display = 'none';
        }
        document.getElementById('currentRoom').innerText = currentRoomId === 'default' ? "공용 로비" : `${currentRoomId}번 궤도`;
    }

    async function userAuth(type) {
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        if(!email || !email.includes('@')) return alert("올바른 이메일 형식을 입력해 주세요.");
        if(!password || password.length < 4) return alert("비밀번호는 최소 4자리 이상이어야 합니다.");

        try {
            const res = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: type, email, password })
            });
            const result = await res.json();
            
            if(result.status === 'success') {
                alert(result.message || "인증 완료!");
                if(type === 'signIn') {
                    currentUser = email;
                    localStorage.setItem('orbit_user_email', currentUser);
                    updateUI();
                    await loadFeeds();
                }
            } else { alert(result.message); }
        } catch(e) { alert("서버 연결 실패"); }
    }

    async function resetPasswordByEmail() {
        const email = prompt("비밀번호를 변경할 이메일 주소를 입력해 주세요:");
        if(!email || !email.includes('@')) return alert("유효한 이메일 주소를 입력하세요.");
        alert("인증 메일을 발송 중입니다...");

        try {
            const res = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'sendAuthCode', email: email })
            });
            const result = await res.json();

            if (result.status === 'success') {
                const userCode = prompt("이메일로 전송된 6자리 인증번호를 입력해 주세요:");
                if (userCode && userCode.trim() === result.authCode.toString()) {
                    const newPassword = prompt("변경하실 새로운 비밀번호를 입력해 주세요 (4자리 이상):");
                    if (!newPassword || newPassword.trim().length < 4) return alert("비밀번호 조건이 맞지 않습니다.");

                    const changeRes = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'changePassword', email: email, newPassword: newPassword.trim() })
                    });
                    const changeResult = await changeRes.json();
                    alert(changeResult.message);
                } else { alert("인증번호가 일치하지 않습니다."); }
            } else { alert(result.message); }
        } catch(e) { alert("서버 통신 오류"); }
    }

    function userLogout() {
        if(!confirm("로그아웃 하시겠습니까?")) return;
        currentUser = null;
        localStorage.removeItem('orbit_user_email');
        updateUI(); loadFeeds();
    }

    async function createRoom() {
        const roomName = prompt("생성할 새로운 방 이름을 입력하세요:");
        if (!roomName || !roomName.trim()) return;
        const password = prompt(`[${roomName}] 방의 비밀번호를 설정하세요:`);
        if (!password) return alert("비밀번호는 필수입니다.");

        const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'createRoom', roomId: roomName.trim(), password: password.trim() })
        });
        const result = await res.json();
        alert(result.message);
    }

    async function joinRoom() {
        const roomName = prompt("입장할 방 이름을 입력하세요 (비워두면 공용 로비):");
        if (!roomName || !roomName.trim()) {
            currentRoomId = 'default';
            localStorage.setItem('roomId', currentRoomId);
            updateUI(); loadFeeds(); return;
        }
        const password = prompt(`[${roomName}] 방의 비밀번호를 입력하세요:`);
        if (!password) return alert("비밀번호를 입력해야 합니다.");

        const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'checkRoom', roomId: roomName.trim(), password: password.trim() })
        });
        const result = await res.json();

        if (result.status === 'success') {
            currentRoomId = roomName.trim();
            localStorage.setItem('roomId', currentRoomId);
            alert(`[${roomName}] 궤도 입장 완료!`);
            updateUI(); loadFeeds();
        } else { alert(result.message); }
    }

    function switchTab(sectionId, element) {
        document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        element.classList.add('active');
        if(sectionId === 'home-sec') loadFeeds();
        if(sectionId === 'capsule-sec') loadCapsules();
        if(sectionId === 'my-sec') loadMyFeeds();
    }

    async function saveFeed() {
        const content = document.getElementById('feedContent').value;
        const emotion = document.getElementById('feedEmotion').value;
        const category = document.getElementById('feedCategory').value;
        if(!content) return alert("내용을 입력하세요!");

        try {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'createFeed', roomId: currentRoomId, user: getSenderName(), content, emotion, category })
            });
            const result = await response.json();
            if(result.status === 'success') {
                document.getElementById('feedContent').value = '';
                await loadFeeds();
            } else { alert("전송 실패"); }
        } catch(e) { alert("통신 에러"); }
    }

    async function loadFeeds() {
        const container = document.getElementById('feedSpace');
        container.innerHTML = '<p style="text-align:center; color:#666;">불러오는 중...</p>';
        try {
            const res = await fetch(`${GAS_WEB_APP_URL}?action=getFeeds&roomId=${encodeURIComponent(currentRoomId)}`);
            let rawData = await res.json();
            container.innerHTML = '';
            
            if(!rawData || !rawData.length) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">기록된 행복이 없습니다.</p>';
                return;
            }

            // ⏰ [하루 한 번 초기화] 24시간 이내의 기록만 필터링하는 기능
            const now = new Date().getTime();
            const oneDayMs = 24 * 60 * 60 * 1000;
            loadedFeedsData = rawData.filter(item => {
                const itemTime = new Date(item.Timestamp || item.timestamp).getTime();
                return (now - itemTime) < oneDayMs;
            });

            if(!loadedFeedsData.length) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">🪐 지난 24시간 동안 올라온 행복이 없습니다.<br>새로운 첫 행복 궤도를 쏘아올려 보세요!</p>';
                return;
            }
            
            loadedFeedsData.reverse().forEach(item => {
                const user = item.User || item.user || '익명 행성';
                const content = item.Content || item.content || '';
                const emotion = item.Emotion || item.emotion || '😊';
                const category = item.Category || item.category || '기타';
                const id = item.ID || item.id || '';
                
                // 댓글 파싱 구조 설계 (기존 열 데이터에 댓글이 파이프| 기호로 누적 저장되어 온다고 가정 처리)
                const commentsRaw = item.Comments || item.comments || '';
                let commentsHtml = '';
                if(commentsRaw) {
                    commentsRaw.split('||').forEach(c => {
                        const parts = c.split('::');
                        if(parts.length >= 2) {
                            commentsHtml += `<div class="comment-item"><span class="comment-author">${parts[0]}:</span>${parts[1]}</div>`;
                        }
                    });
                }

                const rawTime = item.Timestamp || item.timestamp;
                const timestamp = rawTime ? new Date(rawTime).toLocaleDateString() : '';

                container.innerHTML += `
                    <div class="feed-item">
                        <div class="feed-header">
                            <span class="feed-user">⭐ ${user}</span>
                            <span>${timestamp}</span>
                        </div>
                        <div class="feed-body">${content}</div>
                        <div class="feed-footer">
                            <span>${emotion} · ${category}</span>
                            <button class="btn-del" data-html2canvas-ignore="true" onclick="deleteItem('deleteFeed', '${id}')">삭제</button>
                        </div>
                        <div class="comment-section">
                            <div class="comment-list">${commentsHtml ? commentsHtml : '<p style="font-size:0.75rem; color:#555;">아직 등록된 우주 통신(댓글)이 없습니다.</p>'}</div>
                            <div class="comment-form" data-html2canvas-ignore="true">
                                <input type="text" class="comment-input" id="reply-${id}" placeholder="따뜻한 한마디 전하기...">
                                <button class="btn-comment-submit" onclick="submitComment('${id}')">전송</button>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { container.innerHTML = '<p style="text-align:center; color:#ff7675;">데이터를 불러오지 못했습니다.</p>'; }
    }

    // 💬 댓글 업로드 연동 함수
    async function submitComment(feedId) {
        const inputEl = document.getElementById(`reply-${feedId}`);
        const text = inputEl.value.trim();
        if(!text) return alert("댓글 내용을 입력해 주세요.");

        try {
            const res = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    action: 'addComment',
                    id: feedId,
                    author: getSenderName(),
                    content: text
                })
            });
            const result = await res.json();
            if(result.status === 'success') {
                inputEl.value = '';
                await loadFeeds();
            } else { alert("댓글 전송 실패"); }
        } catch(e) { alert("서버 통신 오류"); }
    }

    async function loadMyFeeds() {
        const container = document.getElementById('myFeedSpace');
        if(!currentUser) {
            container.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">로그인 인증 후 조회가 가능합니다.</p>';
            return;
        }
        container.innerHTML = '<p style="text-align:center; color:#666;">불러오는 중...</p>';
        try {
            const res = await fetch(`${GAS_WEB_APP_URL}?action=getMyFeeds&email=${encodeURIComponent(currentUser)}`);
            const myFeeds = await res.json();
            container.innerHTML = '';
            if(!myFeeds || !myFeeds.length) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">작성된 내역이 없습니다.</p>';
                return;
            }
            myFeeds.reverse().forEach(item => {
                const roomId = item.RoomID || item.roomid || 'default';
                const content = item.Content || item.content || '';
                const emotion = item.Emotion || item.emotion || '😊';
                const category = item.Category || item.category || '기타';
                const id = item.ID || item.id || '';
                
                const rawTime = item.Timestamp || item.timestamp;
                const timestamp = rawTime ? new Date(rawTime).toLocaleDateString() : '';

                container.innerHTML += `
                    <div class="feed-item" style="border-left: 4px solid var(--secondary-orbit);">
                        <div class="feed-header">
                            <span class="feed-user"><span class="room-tag">🪐 ${roomId === 'default' ? '공용 로비' : roomId}</span></span>
                            <span>${timestamp}</span>
                        </div>
                        <div class="feed-body">${content}</div>
                        <div class="feed-footer">
                            <span>${emotion} · ${category}</span>
                            <button class="btn-del" data-html2canvas-ignore="true" onclick="deleteItem('deleteFeed', '${id}')">삭제</button>
                        </div>
                    </div>`;
            });
        } catch(e) { container.innerHTML = '<p style="text-align:center; color:#ff7675;">데이터 로딩 실패</p>'; }
    }

    async function deleteItem(action, id) {
        if(!confirm("정말 삭제하시겠습니까?")) return;
        try {
            const res = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action, id })
            });
            const result = await res.json();
            if(result.status === 'success') {
                alert("삭제되었습니다.");
                await loadFeeds();
                if(currentUser) await loadMyFeeds();
            }
        } catch(e) { alert("삭제 실패"); }
    }

    async function saveCapsule() {
        const title = document.getElementById('capTitle').value;
        const openDate = document.getElementById('capDate').value;
        const items = document.getElementById('capItems').value;
        if(!title || !openDate) return alert("필수 항목 입력 누락");

        try {
            const res = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'createCapsule', roomId: currentRoomId, title, openDate, items })
            });
            const result = await res.json();
            if(result.status === 'success') {
                document.getElementById('capTitle').value = '';
                document.getElementById('capDate').value = '';
                document.getElementById('capItems').value = '';
                await loadCapsules();
            }
        } catch(e) { alert("캡슐 전송 실패"); }
    }

    async function loadCapsules() {
        const container = document.getElementById('capsuleSpace');
        container.innerHTML = '<p style="text-align:center; color:#666;">캡슐 로딩 중...</p>';
        try {
            const res = await fetch(`${GAS_WEB_APP_URL}?action=getCapsules&roomId=${encodeURIComponent(currentRoomId)}`);
            const list = await res.json();
            container.innerHTML = '';
            if(!list || !list.length) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">생성된 타임캡슐이 없습니다.</p>';
                return;
            }
            list.reverse().forEach(item => {
                const open = new Date(item.OpenDate);
                const diffDays = Math.ceil((open - new Date()) / (1000 * 60 * 60 * 24));
                let contentText = diffDays > 0 ? "🔒 개봉일 전까지 비밀번호를 지키고 있어요!" : item.Items;
                container.innerHTML += `
                    <div class="capsule-card">
                        <h4 style="color:var(--text-beige);">${item.Title}</h4>
                        <p style="font-size:0.8rem; color:#aaa; margin:5px 0;">개봉일: ${new Date(item.OpenDate).toLocaleDateString()}</p>
                        <div style="background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:5px;">${contentText}</div>
                        <button class="btn-del" data-html2canvas-ignore="true" onclick="deleteItem('deleteCapsule', '${item.ID}')">캡슐 파기</button>
                    </div>`;
            });
        } catch (e) { container.innerHTML = '<p style="text-align:center; color:#ff7675;">캡슐을 가져오지 못했습니다.</p>'; }
    }

    function downloadFeedAsImage() {
        const target = document.getElementById("captureArea");
        html2canvas(target, {
            useCORS: true,
            backgroundColor: "#0F0C20",
            scrollY: -window.scrollY
        }).then(canvas => {
            const link = document.createElement("a");
            link.href = canvas.toDataURL("image/png");
            link.download = `orbit_diary_${new Date().toISOString().slice(0,10)}.png`;
            link.click();
        });
    }
</script>
</body>
</html>
